name: Build & Smoke Test Status

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'website/package.json'

    - name: Install Dependencies
      run: |
        cd website
        npm install

    - name: Run Server Smoke Test
      run: |
        cd website
        # Start server in the background and check if it runs for 3 seconds without throwing errors
        node server.js &
        SERVER_PID=$!
        sleep 3
        # Check if the process is still running
        if kill -0 $SERVER_PID; then
          echo "Server started successfully and is running on port 3000!"
          kill $SERVER_PID
          exit 0
        else
          echo "Error: Server crashed or failed to start!"
          exit 1
        fi
